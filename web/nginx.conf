server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA — 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://gateway:5100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SignalR WebSocket 代理
    location /hubs/ {
        proxy_pass http://gateway:5100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 健康检查 & 指标
    location /healthz { proxy_pass http://gateway:5100; }
    location /readyz  { proxy_pass http://gateway:5100; }
    location /metrics { proxy_pass http://gateway:5100; }
    location /swagger { proxy_pass http://gateway:5100; }
}
